<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <title>妙笔生财绘图</title>
  <style>
    :root {
      /* 修改：背景色稍微调亮，更柔和 */
      --bg-dark: #5F2E2E;
      --glass: rgba(30, 30, 35, 0.75);
      --glass-border: rgba(255, 255, 255, 0.08);
      --accent: #d4af37;
      /* 香槟金 */
      --accent-glow: rgba(212, 175, 55, 0.4);
      --text-main: #e0e0e0;
      --text-muted: #999;
      /* 稍微提亮灰色文字 */
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      color: var(--text-main);
      background-color: var(--bg-dark);

      /* 修改：增加斜向网格线装饰 */
      background-image:
        radial-gradient(circle at 10% 20%, rgba(60, 20, 80, 0.4) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(20, 60, 80, 0.4) 0%, transparent 40%),
        repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.02) 0px, rgba(255, 255, 255, 0.02) 1px, transparent 1px, transparent 30px);

      background-attachment: fixed;
      font-family: "PingFang SC", "Helvetica Neue", Helvetica, sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    @media (max-width: 900px) {
      body {
        height: auto;
        overflow: auto;
        padding-bottom: 40px;
      }
    }

    .app-container {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 24px;
      height: 100%;
      max-width: 1600px;
      margin: 0 auto;
      padding: 24px;
    }

    @media (max-width: 900px) {
      .app-container {
        grid-template-columns: 1fr;
        height: auto;
        display: block;
        padding: 16px;
      }
    }

    .panel-control {
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 24px;
      /* 稍微增加内边距 */
      display: flex;
      flex-direction: column;
      gap: 18px;
      /* 增加间距 */
      overflow-y: auto;
      height: 100%;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    @media (max-width: 900px) {
      .panel-control {
        height: auto;
        margin-bottom: 20px;
      }
    }

    header {
      margin-bottom: 8px;
      border-bottom: 1px solid var(--glass-border);
      padding-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      /* 增大标题 */
      font-weight: 300;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #fff, #bbb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .author-info {
      font-size: 13px;
      /* 增大作者信息 */
      color: var(--text-muted);
      margin-top: 6px;
      display: flex;
      justify-content: space-between;
    }

    .author-highlight {
      color: var(--accent);
      cursor: pointer;
    }

    /* 修改：增大 Label 字体 */
    label {
      display: block;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    /* 修改：增大输入框字体 */
    input[type="text"],
    textarea,
    select {
      width: 100%;
      background-color: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--glass-border);
      color: #fff;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 15px;
      /* 14px -> 15px */
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s, background-color 0.3s;
    }

    select {
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
      padding-right: 36px;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8' fill='none'><path d='M1 1.5L6 6.5L11 1.5' stroke='%23999' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/></svg>");
      background-repeat: no-repeat;
      background-position: right 14px center;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
      line-height: 1.5;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.1);
      background-color: rgba(0, 0, 0, 0.5);
    }

    .config-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .config-grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }

    .inline-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .inline-row label {
      margin-bottom: 0;
      flex-shrink: 0;
      width: 72px;
    }

    .inline-row select {
      flex: 1;
    }

    .drop-zone {
      border: 1px dashed var(--glass-border);
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      padding: 14px;
      text-align: center;
      transition: 0.3s;
      cursor: pointer;
    }

    .drop-zone:hover {
      border-color: var(--text-muted);
      background: rgba(0, 0, 0, 0.4);
    }

    .drop-text {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* 增大 */

    .thumbs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .thumb {
      width: 50px;
      height: 50px;
      border-radius: 6px;
      overflow: hidden;
      position: relative;
      border: 1px solid var(--glass-border);
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .thumb .del {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s;
    }

    .thumb:hover .del {
      opacity: 1;
    }

    /* 按钮 */
    .btn-main {
      background: linear-gradient(135deg, var(--accent), #b89628);
      color: #1a1a1a;
      border: none;
      flex-shrink: 0;
      height: 46px;
      min-height: 46px;
      /* 稍微增高 */
      border-radius: 8px;
      font-weight: 700;
      font-size: 16px;
      /* 增大按钮文字 */
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 12px var(--accent-glow);
      transition: transform 0.1s, box-shadow 0.2s;
    }

    .btn-main:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px var(--accent-glow);
      filter: brightness(1.1);
    }

    .btn-main:active {
      transform: translateY(1px);
    }

    .btn-main[disabled] {
      filter: grayscale(1);
      opacity: 0.6;
      cursor: not-allowed;
    }

    .key-section {
      background: rgba(0, 0, 0, 0.2);
      padding: 12px;
      border-radius: 8px;
    }

    .key-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
      line-height: 1.4;
    }

    /* 增大 */
    .key-input-row {
      display: flex;
      gap: 6px;
    }

    .btn-sm {
      padding: 0 14px;
      height: 34px;
      font-size: 13px;
      /* 增大 */
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--glass-border);
      color: #ccc;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-sm:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .status-bar {
      font-size: 13px;
      text-align: center;
      color: var(--accent);
      min-height: 20px;
      margin-top: -6px;
    }

    /* 增大 */

    .panel-gallery {
      flex: 1;
      overflow-y: auto;
      padding-right: 4px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .result-group {
      margin-bottom: 24px;
      animation: fadeIn 0.5s ease;
    }

    .result-meta {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* 增大 */
    .result-meta::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
    }

    /* 复制按钮样式 */
    .btn-copy {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--glass-border);
      color: var(--text-muted);
      border-radius: 4px;
      cursor: pointer;
      padding: 2px 8px;
      font-size: 12px;
      transition: 0.2s;
    }

    .btn-copy:hover {
      background: var(--accent);
      color: #1a1a1a;
      border-color: var(--accent);
    }

    .grid-imgs {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-start;
    }

    .img-card {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      height: 280px;
      width: auto;
      background: #000;
      border: 1px solid var(--glass-border);
      transition: 0.3s;
      flex-shrink: 0;
    }

    @media (max-width: 600px) {
      .img-card {
        height: 180px;
      }
    }

    .img-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      border-color: var(--text-muted);
    }

    .img-card img {
      height: 100%;
      width: auto;
      object-fit: contain;
      display: block;
    }

    .img-card img.error {
      padding: 40px;
      object-fit: contain;
      opacity: 0.5;
      filter: grayscale(1);
    }

    .overlay-actions {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
      padding: 16px 12px 12px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      opacity: 1;
    }

    .btn-icon {
      background: rgba(255, 255, 255, 0.25);
      border: none;
      color: #fff;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    .btn-icon:hover {
      background: var(--accent);
      color: #000;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.92);
      backdrop-filter: blur(5px);
      display: none;
      flex-direction: column;
    }

    .lightbox.show {
      display: flex;
    }

    .lb-header {
      padding: 16px;
      display: flex;
      justify-content: space-between;
      color: #888;
      font-size: 15px;
    }

    /* 增大 */
    .lb-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    .lb-main img {
      max-width: 100%;
      max-height: 100%;
      box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
      object-fit: contain;
    }

    .lb-footer {
      padding: 20px;
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .lb-btn {
      background: transparent;
      border: 1px solid #444;
      color: #ccc;
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.2s;
      user-select: none;
      font-size: 14px;
    }

    .lb-btn:hover {
      border-color: #fff;
      color: #fff;
      background: rgba(255, 255, 255, 0.1);
    }

    .lb-btn.primary {
      border-color: var(--accent);
      color: var(--accent);
    }

    .lb-btn.primary:hover {
      background: var(--accent);
      color: #000;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(0, 0, 0, 0.1);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    /* History Button - Fixed in gallery area */
    .btn-history {
      position: fixed;
      top: 32px;
      right: 32px;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid var(--glass-border);
      color: var(--text-muted);
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      transition: 0.2s;
      z-index: 50;
      backdrop-filter: blur(4px);
    }

    .btn-history:hover {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }

    @media (max-width: 900px) {
      .btn-history {
        top: auto;
        bottom: 20px;
        right: 20px;
      }
    }

    /* History Modal */
    .history-modal {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0, 0, 0, 0.9);
      display: none;
      flex-direction: column;
      backdrop-filter: blur(10px);
    }

    .history-modal.show {
      display: flex;
    }

    .history-header {
      padding: 20px;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .history-header h3 {
      margin: 0;
      font-size: 18px;
      color: #fff;
    }

    .history-close {
      background: none;
      border: none;
      color: #aaa;
      font-size: 16px;
      cursor: pointer;
      padding: 8px 12px;
    }

    .history-close:hover {
      color: #fff;
    }

    .history-body {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .history-item {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 12px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .history-item-thumb {
      width: 120px;
      height: 68px;
      border-radius: 6px;
      overflow: hidden;
      background: #000;
      flex-shrink: 0;
    }

    .history-item-thumb img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .history-item-info {
      flex: 1;
      min-width: 0;
    }

    .history-item-time {
      font-size: 12px;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .history-item-taskid {
      font-size: 11px;
      color: var(--text-muted);
      font-family: monospace;
      word-break: break-all;
    }

    .history-item-status {
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 3px;
      margin-top: 4px;
      display: inline-block;
    }

    .history-item-status.completed {
      background: rgba(34, 197, 94, 0.2);
      color: #22c55e;
    }

    .history-item-status.pending {
      background: rgba(234, 179, 8, 0.2);
      color: #eab308;
    }

    .history-item-status.failed {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }

    .history-item-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .history-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--glass-border);
      color: #ccc;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    .history-btn:hover {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }

    .history-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--glass-border);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
    }

    .pagination-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--glass-border);
      color: #ccc;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      transition: 0.2s;
    }

    .pagination-btn:hover:not(:disabled) {
      background: var(--accent);
      color: #000;
    }

    .pagination-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .pagination-info {
      color: var(--text-muted);
      font-size: 13px;
    }

    .history-empty {
      text-align: center;
      color: var(--text-muted);
      padding: 60px 20px;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="app-container">
    <aside class="panel-control">
      <header>
        <h1>大鱼儿AI绘图</h1>
        <div class="author-info">
          <span>国内可用 简单快捷</span>
          <span>作者: 大鱼儿 <span class="author-highlight" onclick="copyWx()">微信: 17673871197</span></span>
        </div>
      </header>

      <div>
        <label>创意描述 (Prompt)</label>
        <textarea id="prompt" placeholder="输入图片描述，支持中英文"></textarea>
      </div>

      <div class="inline-row">
        <label>模型</label>
        <select id="modelSelect">
          <option value="gpt-image-2" selected>GPT Image 2</option>
          <option value="nano-banana-pro">Nano Banana Pro</option>
        </select>
      </div>
      <div class="inline-row">
        <label>画幅比例</label>
        <select id="ratioSelect">
          <option value="auto">自动</option>
          <option value="1:1">1:1</option>
          <option value="16:9">16:9</option>
          <option value="9:16">9:16</option>
          <option value="4:3">4:3</option>
          <option value="3:4">3:4</option>
          <option value="3:2">3:2</option>
          <option value="2:3">2:3</option>
          <option value="5:4">5:4</option>
          <option value="4:5">4:5</option>
          <option value="21:9">21:9</option>
        </select>
      </div>
      <div class="inline-row">
        <label>分辨率</label>
        <select id="sizeSelect">
          <option value="1K">1K 标准</option>
          <option value="2K">2K 高清</option>
          <option value="4K" selected>4K 超清</option>
        </select>
      </div>

      <div>
        <label>参考图片或要编辑的图片（可选）</label>
        <div class="drop-zone" id="drop">
          <span class="drop-text">点击或拖拽上传图片</span>
          <input id="file" type="file" accept="image/*" multiple hidden>
        </div>
        <div id="thumbs" class="thumbs"></div>
      </div>

      <div class="key-section">
        <div class="key-label">第3步：输入Key (需为妙笔支持的API Key)</div>
        <div class="key-input-row">
          <input type="text" id="userKey" placeholder="sk-..." style="height:34px;">
          <button class="btn-sm" id="saveKey">保存</button>
          <button class="btn-sm" id="queryCredits">查询剩余</button>
        </div>
      </div>

      <div class="status-bar" id="status"></div>

      <button class="btn-main" id="go">
        <span class="spinner" id="spin"></span>
        <span id="btnText">生成</span>
      </button>
    </aside>

    <main class="panel-gallery" id="gallery">
    </main>
  </div>

  <!-- Fixed History Button -->
  <button class="btn-history" onclick="openHistory()">📋 历史</button>

  <!-- History Modal -->
  <div class="history-modal" id="historyModal">
    <div class="history-header">
      <h3>📋 历史生成记录</h3>
      <button class="history-close" onclick="closeHistory()">✕ 关闭</button>
    </div>
    <div class="history-body">
      <div class="history-list" id="historyList"></div>
    </div>
    <div class="history-footer">
      <button class="pagination-btn" id="historyPrev" onclick="historyPrevPage()">← 上一页</button>
      <span class="pagination-info" id="historyPageInfo">第 1 页 / 共 1 页</span>
      <button class="pagination-btn" id="historyNext" onclick="historyNextPage()">下一页 →</button>
    </div>
  </div>

  <div class="lightbox" id="lightbox">
    <div class="lb-header">
      <span id="lbInfo">Preview</span>
      <span style="cursor:pointer" id="lbClose">✕ 关闭</span>
    </div>
    <div class="lb-main">
      <img id="lbImg" src="" crossorigin="anonymous">
    </div>
    <div class="lb-footer">
      <button class="lb-btn" id="lbPrev">← 前一张</button>
      <button class="lb-btn primary" id="lbDownBtn">↓ 下载原图</button>
      <button class="lb-btn" id="lbNext">后一张 →</button>
    </div>

      function saveHistory(history) {

      function addHistoryItem(taskId, status = 'pending', imageUrls = [], prompt = '') {
        const history = loadHistory();
        const existingIndex = history.findIndex(h => h.taskId === taskId);
        const existing = existingIndex >= 0 ? history[existingIndex] : null;

        // 保留已有数据：如果新传入的是空值，则使用旧值
        const finalImageUrls = imageUrls.length > 0 ? imageUrls : (existing?.imageUrls || []);
        const finalPrompt = prompt || (existing?.prompt || '');

        const item = {
          taskId,
          status,
          imageUrls: finalImageUrls,
          prompt: finalPrompt,
          createdAt: existing ? existing.createdAt : new Date().toISOString(),
          updatedAt: new Date().toISOString()
        };
        if (existingIndex >= 0) {
          history[existingIndex] = item;
        } else {
          history.unshift(item);
        }
        saveHistory(history);
        return item;
      }

      function renderHistoryList() {
        const history = loadHistory();
        const totalPages = Math.max(1, Math.ceil(history.length / historyPerPage));
        historyPage = Math.min(historyPage, totalPages);

        const start = (historyPage - 1) * historyPerPage;
        const pageItems = history.slice(start, start + historyPerPage);

        if (pageItems.length === 0) {
          ui.historyList.innerHTML = '<div class="history-empty">暂无历史记录</div>';

          ui.historyList.innerHTML = pageItems.map(item => {
            const time = new Date(item.createdAt).toLocaleString();
            // 区分状态：completed, pending, timeout(可刷新), failed(真正失败), rejected(审核未通过)
            const isCompleted = item.status === 'completed' && item.imageUrls && item.imageUrls.length > 0;
            const isRealFailed = item.status === 'failed';  // 真正的API失败
            const isRejected = item.status === 'rejected';  // 成功但无图片（审核）
            const isTimeout = item.status === 'timeout';     // 本地轮询超时
            const isPending = item.status === 'pending';

            let statusClass, statusText;
            if (isCompleted) {
              statusClass = 'completed';
              statusText = '已完成';
            } else if (isRealFailed) {
              statusClass = 'failed';
              statusText = '已失败';
            } else if (isRejected) {
              statusClass = 'pending';  // 用pending样式，因为可以刷新
              statusText = '无图片(审核)';
            } else if (isTimeout) {
              statusClass = 'pending';
              statusText = '超时(可刷新)';
            } else {
              statusClass = 'pending';
              statusText = '处理中...';
            }

            const hasImages = item.imageUrls && item.imageUrls.length > 0;
            let thumbText = '等待结果...';
            if (isRealFailed) thumbText = '生成失败';
            if (isRejected) thumbText = '审核未通过';
            const thumbHtml = hasImages
              ? `<img src="${item.imageUrls[0]}" loading="lazy">`

            return `
          <div class="history-item" data-task-id="${item.taskId}">

            <div class="history-item-info">

            <div class="history-item-actions">
              ${hasImages ? `<button class="history-btn" onclick="viewHistoryImages('${item.taskId}')">查看</button>` : ''}
            </div>
          </div>
        `;
          }).join('');
        }

        ui.historyPageInfo.textContent = `第 ${historyPage} 页 / 共 ${totalPages} 页`;
        ui.historyPrev.disabled = historyPage <= 1;
        ui.historyNext.disabled = historyPage >= totalPages;

      // ====== Helper Methods (Removed Poll) ======

      // ====== 核心：生成请求 (同步模式) ======
      ui.go.onclick = async () => {
        const prompt = ui.prompt.value.trim();

        const model = ui.model.value || 'gemini-3.1-flash-image-preview';

        if (!prompt) return msg('请输入一些描述...', true);

        setLoading(true);
        msg('正在生成，请耐心等待...');

        const taskId = Date.now().toString();
        addHistoryItem(taskId, 'pending', [], prompt);

        try {
          let ratio = ui.ratio.value;
          let imgSize = "1024x1024";
          if (ratio === '16:9' || ratio === '3:2' || ratio === '4:3') imgSize = '1536x1024';
          else if (ratio === '9:16' || ratio === '2:3' || ratio === '3:4') imgSize = '1024x1536';
          else if (ratio === '1:1') imgSize = '1024x1024';
          else imgSize = '1024x1024'; // fallback

          let endpoint = 'https://grsai.dakka.com.cn/v1/draw/completions';
          let payload = {};
          let options = {
            method: 'POST',
            headers: {
              'Authorization': 'Bearer ' + key,
              'Content-Type': 'application/json'
            }
          };

          if (model === 'nano-banana-pro') {
            endpoint = 'https://grsai.dakka.com.cn/v1/draw/nano-banana';
            
            // 对 nano-banana-pro 拼接参数
            payload = {
              model: model,
              prompt: prompt,
              aspectRatio: ui.ratio.value === '1:1' ? '1:1' : (ui.ratio.value || 'auto'), 
              imageSize: ui.size.value || '1K',
              webHook: "-1",
              shutProgress: false
            };

            // 如果有参考图，需要放入 urls 数组 (支持 Base64 或 URL)
            if (rawFiles.length > 0) {
              const base64Url = await new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(rawFiles[0]);
              });
              payload.urls = [base64Url];
            }
          } else {
            payload = {
              model: model,
              prompt: prompt,
              aspectRatio: ui.ratio.value, // 1:1, 16:9, 3:2 etc.
              size: ui.size.value, // 1K, 2K, 4K
              webHook: "-1" // 强制接口立即返回任务id用于轮询
            };

            if (rawFiles.length > 0) {
              const base64Url = await new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(rawFiles[0]);
              });
              payload.urls = [base64Url];
            }
          }

          options.body = JSON.stringify(payload);

          const res = await fetch(endpoint, options);
          if (!res.ok) {
            let errMessage = `HTTP ${res.status}`;
            try {
              const errData = await res.json();
              console.error("API 响应错误详情:", errData);
              if (errData.error && errData.error.message) errMessage = errData.error.message;
              else if (errData.message) errMessage = errData.message;
              else if (errData.msg) errMessage = errData.msg; // 添加对 msg 字段的兼容
              else errMessage = JSON.stringify(errData); // 如果没有标准错误字段，则输出完整错误信息
            } catch (e) { }
            
            if (errMessage.includes('experiencing high demand') || res.status === 429) {
               errMessage = `系统当前高负载（API请求过快或并发过高），请稍后重试。\n详细: ${errMessage}`;
            }
            throw new Error(errMessage);
          }

          let urls = [];
          let rawResponseDebug = [];
          
          const contentType = res.headers.get('content-type') || '';
          
          // 如果响应是普通的 JSON，直接抛出异常（针对 API 返回 200 但 code < 0 的情况）
          if (contentType.includes('application/json')) {
            const data = await res.clone().json();
            if (data.code && data.code < 0) {
                console.error("API 业务逻辑错误详情:", data);
                throw new Error(data.msg || data.error || JSON.stringify(data));
            }
          }
          if (contentType.includes('text/event-stream') || contentType.includes('stream') || contentType.includes('application/x-ndjson')) {
            // 处理流式响应
            const reader = res.body.getReader();
            const decoder = new TextDecoder('utf-8');
            let buffer = '';
            
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              
              buffer += decoder.decode(value, { stream: true });
              const lines = buffer.split('\n');
              buffer = lines.pop(); // 保留最后一个不完整的行
              
              for (const line of lines) {
                const trimmed = line.trim();
                if (!trimmed) continue;
                
                let dataStr = trimmed;
                if (dataStr.startsWith('data:')) {
                  dataStr = dataStr.slice(5).trim();
                }
                if (dataStr === '[DONE]') continue;
                
                try {
                  const dataObj = JSON.parse(dataStr);
                  rawResponseDebug.push(dataObj);
                  
                  // 判断是否为错误返回
                  if (dataObj.code && dataObj.code < 0) {
                     throw new Error(dataObj.msg || 'API Error');
                  }

                  // 尝试解析进度和结果
                  if (dataObj.status === 'IN_PROGRESS' || dataObj.progress) {
                    msg(`正在绘制... 进度: ${dataObj.progress || '处理中'}`);
                  }
                  
                  // 寻找图片URL (增强兼容性)
                  let imgUrl = dataObj.imageUrl || dataObj.url;
                  if (!imgUrl && dataObj.data) {
                    if (typeof dataObj.data === 'string' && dataObj.data.startsWith('http')) {
                      imgUrl = dataObj.data;
                    } else if (dataObj.data.url) {
                      imgUrl = dataObj.data.url;
                    } else if (Array.isArray(dataObj.data) && dataObj.data[0]) {
                      imgUrl = dataObj.data[0].url || (dataObj.data[0].b64_json ? `data:image/png;base64,${dataObj.data[0].b64_json}` : null);
                    }
                  }
                  if (!imgUrl && typeof dataObj.result === 'string' && dataObj.result.startsWith('http')) imgUrl = dataObj.result;
                  
                  if (imgUrl) {
                    if (!urls.includes(imgUrl)) urls.push(imgUrl);
                  }
                } catch (e) {
                  if (e.message && e.message.includes('API Error')) {
                    throw e;
                  }
                  // 对于解析失败的数据忽略即可，继续读取
                }
              }
            }
            // 处理最后剩余的buffer
            if (buffer.trim()) {
               let dataStr = buffer.trim();
               if (dataStr.startsWith('data:')) dataStr = dataStr.slice(5).trim();
               if (dataStr !== '[DONE]') {
                 try {
                    const dataObj = JSON.parse(dataStr);
                    rawResponseDebug.push(dataObj);
                    if (dataObj.code && dataObj.code < 0) throw new Error(dataObj.msg || 'API Error');
                    
                    let imgUrl = dataObj.imageUrl || dataObj.url;
                    if (!imgUrl && dataObj.data) {
                      if (typeof dataObj.data === 'string' && dataObj.data.startsWith('http')) imgUrl = dataObj.data;
                      else if (dataObj.data.url) imgUrl = dataObj.data.url;
                      else if (Array.isArray(dataObj.data) && dataObj.data[0]) imgUrl = dataObj.data[0].url || (dataObj.data[0].b64_json ? `data:image/png;base64,${dataObj.data[0].b64_json}` : null);
                    }
                    if (!imgUrl && typeof dataObj.result === 'string' && dataObj.result.startsWith('http')) imgUrl = dataObj.result;

                    if (imgUrl) {
                      if (!urls.includes(imgUrl)) urls.push(imgUrl);
                    }
                 } catch (e) {
                    if (e.message && e.message.includes('API Error')) throw e;
                 }
               }
            }
          } else {
            // 处理同步 JSON 响应
            const data = await res.json();
            rawResponseDebug.push(data);
            
            // 尝试从多种常见结构中提取图片
            if (data.imageUrl) urls.push(data.imageUrl);
            else if (data.url) urls.push(data.url);
            else if (data.result && typeof data.result === 'string' && data.result.startsWith('http')) urls.push(data.result);
            else if (data.data) {
              if (typeof data.data === 'string' && data.data.startsWith('http')) {
                urls.push(data.data);
              } else if (Array.isArray(data.data)) {
                urls = data.data.map(item => {
                  if (item.url) return item.url;
                  if (item.b64_json) return `data:image/png;base64,${item.b64_json}`;
                  return null;
                }).filter(u => u);
              }
            } else if (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) {
              const content = data.choices[0].message.content;
              const mdImageRegex = /!\[.*?\]\((https?:\/\/[^\s\)]+)\)/g;
              let match;
              let foundUrl = false;
              while ((match = mdImageRegex.exec(content)) !== null) {
                urls.push(match[1]);
                foundUrl = true;
              }
              if (!foundUrl) {
                // 如果没有匹配到 markdown 图片，尝试直接提取纯 URL
                const urlRegex = /(https?:\/\/[^\s\)]+)/g;
                while ((match = urlRegex.exec(content)) !== null) {
                  urls.push(match[1]);
                  foundUrl = true;
                }
              }
            }
          }

          if (urls.length > 0) {
            msg('创作完成');
            addHistoryItem(taskId, 'completed', urls, prompt);
            addGalleryGroup(urls, prompt);
          } else {
            const lastData = rawResponseDebug[rawResponseDebug.length - 1] || {};
            // 判断是否返回了包含id的数据结构（需要轮询获取结果）
            const pollingId = lastData.id || lastData.task_id || (lastData.data && lastData.data.id) || (lastData.data && typeof lastData.data === 'string' && !lastData.data.startsWith('http') ? lastData.data : null);
            
            if (pollingId) {
              msg(`任务已提交 (ID: ${pollingId})，正在等待绘制完成...`, false);
              
              // 启动轮询机制
              let pollCount = 0;
              const maxPolls = 150; // 最多轮询150次 (约5分钟)
              const pollInterval = 2000; // 每2秒轮询一次
              
              const pollTimer = setInterval(async () => {
                pollCount++;
                try {
                  const pollRes = await fetch('https://grsai.dakka.com.cn/v1/draw/result', {
                    method: 'POST',
                    headers: {
                      'Authorization': 'Bearer ' + key,
                      'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ id: pollingId })
                  });
                  
                  if (!pollRes.ok) throw new Error(`HTTP ${pollRes.status}`);
                  
                  const pollData = await pollRes.json();
                  if (pollData.code && pollData.code < 0) {
                     clearInterval(pollTimer);
                     throw new Error(pollData.msg || 'API Error');
                  }
                  
                  // 根据文档格式，实际数据可能包裹在 data 中
                  const targetData = pollData.data || pollData;
                  
                  // 提取进度和状态
                  const progress = targetData.progress || pollData.progress;
                  const status = targetData.status || pollData.status;
                  
                  if (progress !== undefined && status !== 'SUCCESS' && status !== 'succeeded') {
                    msg(`正在绘制... 进度: ${progress}%`);
                  }
                  
                  // 寻找最终图片URL (严格按照文档结构，并兼顾其他可能格式)
                  let imgUrl = null;
                  if (targetData.results && targetData.results[0] && targetData.results[0].url) {
                    imgUrl = targetData.results[0].url;
                  } else {
                    imgUrl = targetData.imageUrl || targetData.url || targetData.image_url;
                    if (!imgUrl && typeof targetData === 'string' && targetData.startsWith('http')) {
                      imgUrl = targetData;
                    } else if (!imgUrl && Array.isArray(targetData) && targetData[0]) {
                      imgUrl = targetData[0].url || targetData[0].imageUrl || (targetData[0].b64_json ? `data:image/png;base64,${targetData[0].b64_json}` : null);
                    }
                    if (!imgUrl && typeof pollData.result === 'string' && pollData.result.startsWith('http')) {
                      imgUrl = pollData.result;
                    }
                  }
                  
                  // 检查任务是否失败
                  if (status === 'FAILED' || status === 'FAILURE' || status === 'failed') {
                    clearInterval(pollTimer);
                    addHistoryItem(taskId, 'failed', [], prompt);
                    msg(`绘制失败: ${targetData.failure_reason || targetData.error || targetData.failReason || targetData.msg || pollData.msg || '未知错误'}`, true);
                    setLoading(false);
                    return;
                  }

                  if (status === 'SUCCESS' || status === 'succeeded' || imgUrl) {
                    if (imgUrl) {
                      clearInterval(pollTimer);
                      msg('创作完成');
                      addHistoryItem(taskId, 'completed', [imgUrl], prompt);
                      addGalleryGroup([imgUrl], prompt);
                      setLoading(false);
                    } else {
                      // 状态成功但找不到图片，打印出来方便调试
                      msg(`任务已成功，但解析图片失败: ${JSON.stringify(targetData).substring(0, 150)}`, true);
                      console.log("成功但无图片:", pollData);
                    }
                  } else if (pollCount >= maxPolls) {
                    clearInterval(pollTimer);
                    addHistoryItem(taskId, 'failed', [], prompt);
                    msg('轮询超时，未能在规定时间内获取到图片', true);
                    setLoading(false);
                  }
                } catch (err) {
                  clearInterval(pollTimer);
                  console.error('轮询错误:', err);
                  addHistoryItem(taskId, 'failed', [], prompt);
                  msg('轮询错误: ' + (err.message || '未知错误'), true);
                  setLoading(false);
                }
              }, pollInterval);
              
              // 既然进入轮询，我们在当前作用域中不再立刻设置为false，让轮询函数内部控制
              return; // 提前退出，避免执行外层的 finally { setLoading(false) }
            } else {
              addHistoryItem(taskId, 'failed', [], prompt);
              const debugStr = rawResponseDebug.length > 0 ? JSON.stringify(lastData) : '空';
              console.log("API 未返回图片，完整响应:", rawResponseDebug);
              msg('未返回有效图片: ' + debugStr.substring(0, 100) + '...', true);
            }
          }

          // 如果没有被轮询拦截，则直接在这里关闭loading
          setLoading(false);
        } catch (err) {
          console.error(err);
          addHistoryItem(taskId, 'failed', [], prompt);
          msg('错误: ' + (err.message || '未知错误'), true);
          setLoading(false);
        }
      };

      // ====== 界面更新 ======
      function setLoading(ing) {
        if (ing) {
          ui.go.disabled = true;
          ui.spin.style.display = 'inline-block';
          ui.btnText.textContent = '正在绘制...';
        } else {
          ui.go.disabled = false;
          ui.spin.style.display = 'none';
          ui.btnText.textContent = '生成';
        }
      }

      function msg(txt, err = false) {
        ui.status.textContent = txt;
        ui.status.style.color = err ? '#ff6b6b' : 'var(--accent)';
      }

      function addGalleryGroup(urls, prompt) {
        const time = new Date().toLocaleTimeString();

        // 创建容器
        const group = document.createElement('div');
        group.className = 'result-group';

        // 创建 meta 信息
        const meta = document.createElement('div');
        meta.className = 'result-meta';
        meta.innerHTML = `
      <span>${time}</span>
      <span style="opacity:0.6; max-width:200px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${prompt}</span>
      <button class="btn-copy" data-text="${prompt.replace(/"/g, '&quot;')}" onclick="copyFromData(this)">复制</button>
    `;
        group.appendChild(meta);

        // 创建图片网格
        const grid = document.createElement('div');
        grid.className = 'grid-imgs';

        urls.forEach(url => {
          const card = document.createElement('div');
          card.className = 'img-card';
          card.onclick = () => openLightbox(url);

          const img = document.createElement('img');
          img.crossOrigin = 'anonymous';

          // 关键修复：图片加载完成后强制触发重绘
          img.onload = function () {
            // 方法1: visibility 切换（对 WebView 最有效）
            this.style.visibility = 'hidden';
            void this.offsetHeight;
            this.style.visibility = 'visible';

            // 方法2: 触发父容器重绘
            card.style.opacity = '0.99';
            setTimeout(() => {
              card.style.opacity = '1';
            }, 0);
          };

          img.onerror = function () {
            this.src = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjZmZmIiBzdHJva2Utd2lkdGg9IjIiPjxjaXJjbGUgY3g9IjEyIiBjeT0iMTIiIHI9IjEwIi8+PGxpbmUgeDE9IjEyIiB5MT0iOCIgeDI9IjEyIiB5Mj0iMTIiLz48bGluZSB4MT0iMTIiIHkxPSIxNiIgeDI9IjEyLjAxIiB5Mj0iMTYiLz48L3N2Zz4=';
            this.className = 'error';
          };

          // 设置 src（放在事件绑定后）
          img.src = url;

          const overlay = document.createElement('div');
          overlay.className = 'overlay-actions';
          const dlBtn = document.createElement('button');
          dlBtn.className = 'btn-icon';
          dlBtn.innerHTML = '↓';
          dlBtn.onclick = (e) => { e.stopPropagation(); download(url); };
          overlay.appendChild(dlBtn);

          card.appendChild(img);
          card.appendChild(overlay);
          grid.appendChild(card);
        });

        group.appendChild(grid);

        // 先设置 visibility hidden，插入后再显示，强制重绘
        group.style.visibility = 'hidden';
        ui.gallery.insertBefore(group, ui.gallery.firstChild);

        // 强制重排后显示
        void group.offsetHeight;
        group.style.visibility = 'visible';

        // 延迟再次强制重绘
        setTimeout(() => {
          group.style.display = 'none';
          void group.offsetHeight;
          group.style.display = '';

          // 滚动到结果
          if (window.innerWidth <= 900) {
            group.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
        }, 100);

        // 500ms 后最终保底重绘
        setTimeout(() => {
          const imgs = group.querySelectorAll('img');
          imgs.forEach(img => {
            img.style.visibility = 'hidden';
            void img.offsetHeight;
            img.style.visibility = 'visible';
          });
        }, 500);
      }

      // ====== Lightbox 逻辑优化 (支持跨批次切换与键盘) ======

      // 获取当前页面所有图片元素（DOM顺序）
      function getAllImages() {
        return Array.from(document.querySelectorAll('.panel-gallery .img-card img'));
      }

      // 打开大图
      window.openLightbox = (url) => {
        viewingFromHistory = false;  // 从图库查看时重置标记
        const imgs = getAllImages();
        // 查找当前图片索引（根据src匹配）
        currentImgIndex = imgs.findIndex(img => img.src === url);
        updateLightboxImage();
        ui.lb.classList.add('show');
      };

      // 刷新大图显示
      function updateLightboxImage() {
        const imgs = getAllImages();
        if (currentImgIndex < 0 || currentImgIndex >= imgs.length) return;

        const imgObj = imgs[currentImgIndex];
        currentLbUrl = imgObj.src;
        ui.lbImg.src = currentLbUrl;
        ui.lbInfo.textContent = `Preview (${currentImgIndex + 1} / ${imgs.length})`;
      }

      // 切换逻辑
      function prevImage() {
        const imgs = getAllImages();
        if (currentImgIndex > 0) {
          currentImgIndex--;
          updateLightboxImage();
        }
      }

      function nextImage() {
        const imgs = getAllImages();
        if (currentImgIndex < imgs.length - 1) {
          currentImgIndex++;
          updateLightboxImage();
        }
      }

      // 关闭逻辑
      function closeLightbox() {
        ui.lb.classList.remove('show');
        // 如果是从历史记录打开的，关闭大图后返回历史列表
        if (viewingFromHistory) {
          viewingFromHistory = false;
          ui.historyModal.style.visibility = 'visible';
        }
      }

      // 事件绑定: 按钮
      ui.lbPrev.onclick = (e) => { e.stopPropagation(); prevImage(); };
      ui.lbNext.onclick = (e) => { e.stopPropagation(); nextImage(); };
      ui.lbClose.onclick = closeLightbox;
      ui.lbDownBtn.onclick = () => { if (currentLbUrl) download(currentLbUrl); };

      // 事件绑定: 智能点击空白关闭
      ui.lb.onclick = (e) => {
        // 如果点击的是背景层(ui.lb)、主容器(lbMain)、或头部底部，而非图片本身和按钮
        // 简单判断: 只要不是 IMG 或 BUTTON 标签，就可以认为是空白区域
        const tag = e.target.tagName;
        if (tag !== 'IMG' && tag !== 'BUTTON') {
          closeLightbox();
        }
      };

      // 事件绑定: 键盘 (Esc, Left, Right)
      document.addEventListener('keydown', (e) => {
        // 先检查大图框是否显示
        if (ui.lb.classList.contains('show')) {
          switch (e.key) {
            case 'Escape': closeLightbox(); break;
            case 'ArrowLeft': if (!viewingFromHistory) prevImage(); break;
            case 'ArrowRight': if (!viewingFromHistory) nextImage(); break;
          }
          return;
        }

        // ESC 关闭历史弹窗
        if (e.key === 'Escape' && ui.historyModal.classList.contains('show')) {
          closeHistory();
        }
      });

      // 下载功能
      window.download = async (url) => {
        msg('正在下载原图...');
        try {
          const res = await fetch(url);
          if (!res.ok) throw new Error('Network error');
          const blob = await res.blob();
          const blobUrl = URL.createObjectURL(blob);

          const a = document.createElement('a');
          a.href = blobUrl;
          a.download = `art-${Date.now()}.png`;
          document.body.appendChild(a);
          a.click();
          a.remove();

          setTimeout(() => URL.revokeObjectURL(blobUrl), 100);
          msg('下载已触发');
        } catch (e) {
          console.warn('Fallback to link', e);
          const a = document.createElement('a');
          a.href = url;
          a.target = '_blank';
          a.download = `art-${Date.now()}.png`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          msg('已在新窗口打开');
        }
      };

      window.copyWx = () => {
        navigator.clipboard.writeText('13476192892');
        msg('微信号已复制');
      };

      window.copyFromData = (btn) => {
        const txt = btn.getAttribute('data-text');
        navigator.clipboard.writeText(txt).then(() => {
          const originalText = btn.innerText;
          btn.innerText = '已复制';
          setTimeout(() => btn.innerText = originalText, 1500);
        });
      };

      const toBase64 = file => new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result);
        r.onerror = rej;
        r.readAsDataURL(file);
      });

    })();
  </script>
